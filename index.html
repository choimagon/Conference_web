<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Conference_web</title>

  <!-- ✅ 파비콘 (같은 폴더에 favicon.ico 두면 됨) -->
  <link rel="icon" href="icon.jpg" />

  <style>
    :root{
      --bg:#0b0f17; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --line:#1f2937;
      --btn:#1f2937; --btnHover:#334155; --shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1f2a44 0%, var(--bg) 55%) no-repeat, var(--bg);
      color:var(--text);
    }
    .wrap{max-width:780px; margin:0 auto; padding:36px 18px 60px}
    header{margin-bottom:18px; display:flex; align-items:center; gap:10px}
    .logo{
      width:38px; height:38px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(17,24,39,.85);
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      font-size:18px;
      user-select:none;
    }
    h1{margin:0; font-size:22px; letter-spacing:-0.02em}
    .card{
      margin-top:18px; background:rgba(17,24,39,.85); border:1px solid var(--line);
      border-radius:16px; padding:16px; box-shadow: var(--shadow); backdrop-filter: blur(6px);
    }
    .grid{display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px}
    @media (max-width:560px){ .grid{grid-template-columns:1fr} }
    a.link{
      display:flex; align-items:center; justify-content:space-between;
      text-decoration:none; color:var(--text);
      background:var(--btn); border:1px solid var(--line);
      padding:14px 14px; border-radius:12px;
      transition: .15s ease;
    }
    a.link:hover{ background:var(--btnHover); transform: translateY(-1px) }
    .name{font-weight:650}
    .arrow{opacity:.85}
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="logo" aria-hidden="true">🌐</div>
      <h1>학회 목록</h1>
    </header>

    <section class="card">
      <div class="grid">
        <a class="link" href="wacv2026_papers_viewer.html">
          <div class="name">📚 WACV 2026</div>
          <div class="arrow">→</div>
        </a>

        <a class="link" href="?.html">
          <div class="name">📌 ??</div>
          <div class="arrow">→</div>
        </a>
      </div>
    </section>
  </div>
</body>
</html>
